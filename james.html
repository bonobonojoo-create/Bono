<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>직원 소개</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #efefef;
      color: #111;
    }

    body {
      min-height: 100vh;
    }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(0,31,255,0.08), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(0,255,242,0.08), transparent 22%),
        linear-gradient(180deg, #efefef 0%, #f7f7f7 100%);
    }

    .container {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      max-width: 1120px;
      margin: 0 auto;
      padding: 34px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-wrap {
      position: relative;
      width: 100%;
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      gap: 20px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 30px;
      padding: 22px;
      box-shadow: 0 18px 50px rgba(0, 31, 255, 0.05);
      backdrop-filter: blur(14px);
    }

    /* 왼쪽 카드 */
    .profile-card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 22px;
      color: #f8fbff;
      background: linear-gradient(
        135deg,
        #001fff 0%,
        rgba(0, 70, 255, 0.95) 40%,
        rgba(0, 150, 255, 0.88) 72%,
        rgba(0, 255, 242, 0.78) 100%
      );
      border: 1px solid rgba(255,255,255,0.24);
      box-shadow:
        0 16px 40px rgba(0, 31, 255, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.14);
    }

    .profile-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 18%, rgba(255,255,255,0.24), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(255,255,255,0.12), transparent 18%),
        linear-gradient(125deg, rgba(255,255,255,0.10), transparent 42%);
      pointer-events: none;
    }

    .badge {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.12);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00fff2;
    }

    .photo-box {
      position: relative;
      z-index: 1;
      margin-top: 16px;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.10);
    }

    .photo-box img {
      display: block;
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .info-list {
      position: relative;
      z-index: 1;
      margin-top: 16px;
      display: grid;
      gap: 8px;
    }

    .info-item {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.11);
    }

    .info-label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      color: rgba(236, 244, 255, 0.78);
    }

    .info-value {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      line-height: 1.45;
      word-break: break-word;
    }

    /* 오른쪽 카드 */
    .content-card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(0, 31, 255, 0.08);
      background: rgba(255,255,255,0.9);
      padding: 24px;
      min-height: 540px;
      display: flex;
      flex-direction: column;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      color: rgba(0,0,0,0.45);
    }

    h1 {
      margin: 10px 0 14px;
      font-size: 31px;
      line-height: 1.15;
      color: #001fff;
    }

    .gradient-text {
      color: #001fff;
    }

    .comment-section {
      margin-top: 14px;
      padding-top: 6px;
    }

    .comment-content {
      font-size: 15px;
      line-height: 1.82;
      color: rgba(20, 24, 35, 0.82);
      white-space: pre-line;
      word-break: keep-all;
    }

    .keyword-box {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(0,31,255,0.08);
    }

    .keyword-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }

    .keyword-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .keyword-tag {
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(0, 31, 255, 0.06);
      border: 1px solid rgba(0, 31, 255, 0.10);
      color: #001fff;
      font-size: 13px;
      font-weight: 600;
    }

    /* 캐릭터 영역 - 아래쪽 고정 느낌 */
    .character-row-wrap {
      margin-top: auto;
      padding-top: 22px;
    }

    .character-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .character-item {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      flex: 0 0 auto;
    }

    .character-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* char6 전용: 왼쪽으로 90도 회전 + 크기 보정 */
    .character-item.char6 img {
      transform: rotate(0deg) scale(1.4);
      transform-origin: center center;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1000px) {
      .card-wrap {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .container {
        padding: 18px 14px;
      }

      .card-wrap {
        padding: 16px;
        gap: 14px;
      }

      .profile-card,
      .content-card {
        padding: 18px;
      }

      h1 {
        font-size: 26px;
      }

      .photo-box img {
        height: 200px;
      }

      .character-item {
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>
<body>
  <script>
    /* ============================================
       여기만 수정하면 됩니다
       ============================================ */
    const 직원정보 = {
      이름: "정우",
      이메일: "wooseok.jung@soslab.co",
      전화번호: "010-7940-3632",
      팀: "F/W Team",
      직책: "Member",
      근무지역: "판교",
      사진: "james.png",
      코멘트: `- **Roles and Responsibilities (R&R)**
    - **F/W Team Member**
    - **양산개발**
        - **ML-XM**
            - 정적/동적 검증
            - 오픈소스 검증
            - DV 단계 F/W 개발
            - DV 단계 H/W 검증
            - 소프트웨어 설계 사양서
        - **ML-X Rev.1**
            - F/W 통합
        - **ML-X Rev.2**
            - F/W 통합
            - 고객대응
            - 기능 추가
    - **과제**
        - 미정`,
      키워드: ["INFP", "O", "본드"],

      /* 캐릭터 보이기 / 숨기기 */
      캐릭터보이기: true,

      /* 넣고 싶은 캐릭터만 파일명 넣기 */
      캐릭터목록: ["char1.png", "char2.png", "char3.png", "char4.png", "char5.png", "char6.png"]
    };

    const 화면문구 = {
      상단라벨: "프로필",
      오른쪽제목앞: "James",
      오른쪽제목강조: ""
    };
  </script>

  <div class="page">
    <main class="container">
      <section class="card-wrap">
        <div class="profile-card">
          <div class="badge">
            <span class="badge-dot"></span>
            <span id="topLabel"></span>
          </div>

          <div class="photo-box">
            <img id="profileImage" alt="프로필 사진" />
          </div>

          <div class="info-list">
            <div class="info-item">
              <span class="info-label">이름</span>
              <span class="info-value" id="name"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Email</span>
              <span class="info-value" id="email"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Phone Number</span>
              <span class="info-value" id="phone"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Team</span>
              <span class="info-value" id="team"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Position</span>
              <span class="info-value" id="position"></span>
            </div>
            <div class="info-item">
              <span class="info-label">근무지역</span>
              <span class="info-value" id="location"></span>
            </div>
          </div>
        </div>

        <div class="content-card">
          <div class="section-label">COMMENTS</div>

          <h1>
            <span id="titleFront"></span>
            <span class="gradient-text" id="titleAccent"></span>
          </h1>

          <div class="comment-section">
            <div class="comment-content" id="commentText"></div>
          </div>

          <div class="keyword-box">
            <p class="keyword-title">키워드</p>
            <div class="keyword-tags" id="keywordTags"></div>
          </div>

          <div class="character-row-wrap" id="characterRowWrap">
            <div class="character-row" id="characterRow"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    document.getElementById("topLabel").textContent = 화면문구.상단라벨;
    document.getElementById("profileImage").src = 직원정보.사진;
    document.getElementById("name").textContent = 직원정보.이름;
    document.getElementById("email").textContent = 직원정보.이메일;
    document.getElementById("phone").textContent = 직원정보.전화번호;
    document.getElementById("team").textContent = 직원정보.팀;
    document.getElementById("position").textContent = 직원정보.직책;
    document.getElementById("location").textContent = 직원정보.근무지역;
    document.getElementById("titleFront").textContent = 화면문구.오른쪽제목앞;
    document.getElementById("titleAccent").textContent = 화면문구.오른쪽제목강조;
    document.getElementById("commentText").textContent = 직원정보.코멘트;

    const keywordTags = document.getElementById("keywordTags");
    직원정보.키워드.forEach((키워드) => {
      const span = document.createElement("span");
      span.className = "keyword-tag";
      span.textContent = 키워드;
      keywordTags.appendChild(span);
    });

    const characterRowWrap = document.getElementById("characterRowWrap");
    const characterRow = document.getElementById("characterRow");

    if (!직원정보.캐릭터보이기) {
      characterRowWrap.classList.add("hidden");
    } else {
      직원정보.캐릭터목록.forEach((이미지경로) => {
        const item = document.createElement("div");
        item.className = "character-item";

        if (이미지경로 === "char6.png") {
          item.classList.add("char6");
        }

        const img = document.createElement("img");
        img.src = 이미지경로;
        img.alt = "";
        img.onerror = function () {
          item.style.display = "none";
        };

        item.appendChild(img);
        characterRow.appendChild(item);
      });
    }
  </script>
</body>
</html>
