<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>직원 소개</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #eef3ff;
      color: #111111;
    }

    .page {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(0,31,255,0.14), transparent 30%),
        radial-gradient(circle at 85% 18%, rgba(0,255,242,0.18), transparent 24%),
        linear-gradient(180deg, #eef3ff 0%, #f7fbff 100%);
    }

    .blur {
      position: absolute;
      border-radius: 9999px;
      filter: blur(70px);
      pointer-events: none;
      z-index: 0;
    }

    .blur.blue {
      top: -80px;
      left: -6%;
      width: 260px;
      height: 260px;
      background: rgba(0, 31, 255, 0.16);
    }

    .blur.mint {
      bottom: -30px;
      right: -5%;
      width: 260px;
      height: 260px;
      background: rgba(0, 255, 242, 0.18);
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-wrap {
      width: 100%;
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 30px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 31, 255, 0.08);
      backdrop-filter: blur(16px);
    }

    .profile-card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 22px;
      color: #f8fbff;
      background:
        linear-gradient(
          135deg,
          #001fff 0%,
          rgba(0,31,255,0.92) 34%,
          rgba(0,140,255,0.86) 68%,
          rgba(0,255,242,0.78) 100%
        );
      border: 1px solid rgba(255,255,255,0.20);
      box-shadow:
        0 20px 48px rgba(0, 31, 255, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.14);
    }

    .profile-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 16% 18%, rgba(255,255,255,0.22), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(255,255,255,0.14), transparent 18%),
        linear-gradient(125deg, rgba(255,255,255,0.10), transparent 42%);
      pointer-events: none;
    }

    .profile-card::after {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(to right, rgba(255,255,255,0.9), #00fff2, rgba(255,255,255,0.9));
    }

    .badge {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 9999px;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(255,255,255,0.10);
      font-size: 11px;
      letter-spacing: 0.10em;
      color: rgba(255,255,255,0.88);
      backdrop-filter: blur(8px);
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00fff2;
      box-shadow: 0 0 10px rgba(0,255,242,0.7);
    }

    .photo-box {
      position: relative;
      z-index: 1;
      margin-top: 16px;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 12px 28px rgba(0, 20, 90, 0.20);
    }

    .photo-box img {
      display: block;
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .info-list {
      position: relative;
      z-index: 1;
      margin-top: 16px;
      display: grid;
      gap: 8px;
    }

    .info-item {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .info-label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      color: rgba(232, 244, 255, 0.72);
    }

    .info-value {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      word-break: break-word;
      line-height: 1.45;
    }

    .content-card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      border-radius: 24px;
      border: 1px solid rgba(0,31,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(246,250,255,0.96));
      padding: 22px;
      overflow: hidden;
    }

    .section-label {
      position: relative;
      z-index: 3;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: rgba(0,0,0,0.45);
    }

    h1 {
      position: relative;
      z-index: 3;
      margin: 10px 0 0;
      font-size: 30px;
      line-height: 1.15;
      color: #001fff;
    }

    .gradient-text {
      margin-left: 6px;
      color: #001fff;
    }

    /* 오른쪽 카드 안에서 떠다니는 캐릭터 */
    .floating-characters {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
      pointer-events: none;
    }

    .floating-char {
      position: absolute;
      width: 46px;
      height: 46px;
      pointer-events: auto;
      z-index: 2;
    }

    .floating-char img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: transform 0.25s ease, filter 0.25s ease;
      filter: drop-shadow(0 6px 10px rgba(0,31,255,0.18));
      animation: bob 3.6s ease-in-out infinite;
      transform-origin: center center;
      user-select: none;
      -webkit-user-drag: none;
    }

    .floating-char:hover img {
      transform: scale(1.3);
      filter: drop-shadow(0 10px 18px rgba(0,31,255,0.24));
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-6px) rotate(2deg); }
    }

    /* 6개 전부 보이도록, 소개글 앞쪽에서 움직이도록 */
    .c1 { top: 74px; left: 16px; animation: move1 14s ease-in-out infinite alternate; }
    .c2 { top: 78px; right: 18px; animation: move2 16s ease-in-out infinite alternate; }
    .c3 { top: 150px; left: 58px; animation: move3 15s ease-in-out infinite alternate; }
    .c4 { top: 162px; right: 68px; animation: move4 17s ease-in-out infinite alternate; }
    .c5 { top: 255px; left: 20px; animation: move5 18s ease-in-out infinite alternate; }
    .c6 { top: 270px; right: 24px; animation: move6 16s ease-in-out infinite alternate; }

    @keyframes move1 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(120px, 38px); }
    }

    @keyframes move2 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-112px, 48px); }
    }

    @keyframes move3 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(145px, 24px); }
    }

    @keyframes move4 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-132px, 34px); }
    }

    @keyframes move5 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(155px, -42px); }
    }

    @keyframes move6 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-145px, -36px); }
    }

    .comment-section {
      position: relative;
      z-index: 3;
      margin-top: 18px;
      padding: 2px 0 0;
    }

    .comment-content {
      font-size: 15px;
      line-height: 1.8;
      color: rgba(15,23,42,0.78);
      white-space: pre-line;
      word-break: keep-all;
    }

    .keyword-box {
      position: relative;
      z-index: 3;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(0,31,255,0.08);
    }

    .keyword-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
    }

    .keyword-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .keyword-tag {
      padding: 7px 12px;
      border-radius: 9999px;
      background: linear-gradient(135deg, rgba(0,31,255,0.08), rgba(0,255,242,0.10));
      border: 1px solid rgba(0,31,255,0.10);
      color: #001fff;
      font-size: 13px;
      font-weight: 600;
    }

    @media (max-width: 1000px) {
      .card-wrap {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .container {
        padding: 18px 14px;
      }

      .card-wrap {
        padding: 16px;
        gap: 14px;
      }

      .profile-card,
      .content-card {
        padding: 18px;
      }

      h1 {
        font-size: 26px;
      }

      .photo-box img {
        height: 200px;
      }

      .comment-content {
        font-size: 14px;
        line-height: 1.7;
      }

      .floating-char {
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>
<body>
  <script>
    const 직원정보 = {
      이름: "김연주",
      이메일: "yeonju.kim@soslab.co",
      전화번호: "010-4224-1119",
      팀: "Validation개발팀",
      직책: "프로덕트 담당",
      근무지역: "판교",
      사진: "bono.png",
      코멘트: `안녕하세요.

저는 김연주입니다.
현재 Validation개발팀에서 업무를 담당하고 있습니다.

협업할 때는 정확하고 보기 쉽게 정리하는 것을 중요하게 생각합니다.
새로운 아이디어를 함께 이야기하고, 필요한 내용을 빠르게 공유하는 것을 좋아합니다.

앞으로도 즐겁게 소통하면서 좋은 결과를 만들어가고 싶습니다.
잘 부탁드립니다 :)`,
      키워드: ["다이어트", "홍길동", "해달"]
    };

    const 화면문구 = {
      상단라벨: "프로필",
      오른쪽제목앞: "소개와",
      오른쪽제목강조: "코멘트"
    };

    const 캐릭터목록 = [
      "char1.png",
      "char2.png",
      "char3.png",
      "char4.png",
      "char5.png",
      "char6.png"
    ];
  </script>

  <div class="page">
    <div class="blur blue"></div>
    <div class="blur mint"></div>

    <main class="container">
      <section class="card-wrap">
        <div class="profile-card">
          <div class="badge">
            <span class="badge-dot"></span>
            <span id="topLabel"></span>
          </div>

          <div class="photo-box">
            <img id="profileImage" alt="프로필 사진" />
          </div>

          <div class="info-list">
            <div class="info-item">
              <span class="info-label">이름</span>
              <span class="info-value" id="name"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Email</span>
              <span class="info-value" id="email"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Phone Number</span>
              <span class="info-value" id="phone"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Team</span>
              <span class="info-value" id="team"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Position</span>
              <span class="info-value" id="position"></span>
            </div>
            <div class="info-item">
              <span class="info-label">근무지역</span>
              <span class="info-value" id="location"></span>
            </div>
          </div>
        </div>

        <div class="content-card">
          <div class="section-label">COMMENTS</div>

          <h1>
            <span id="titleFront"></span>
            <span class="gradient-text" id="titleAccent"></span>
          </h1>

          <div class="floating-characters" id="floatingCharacters"></div>

          <div class="comment-section">
            <div class="comment-content" id="commentText"></div>
          </div>

          <div class="keyword-box">
            <p class="keyword-title">키워드</p>
            <div class="keyword-tags" id="keywordTags"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    document.getElementById("topLabel").textContent = 화면문구.상단라벨;
    document.getElementById("profileImage").src = 직원정보.사진;
    document.getElementById("name").textContent = 직원정보.이름;
    document.getElementById("email").textContent = 직원정보.이메일;
    document.getElementById("phone").textContent = 직원정보.전화번호;
    document.getElementById("team").textContent = 직원정보.팀;
    document.getElementById("position").textContent = 직원정보.직책;
    document.getElementById("location").textContent = 직원정보.근무지역;
    document.getElementById("titleFront").textContent = 화면문구.오른쪽제목앞;
    document.getElementById("titleAccent").textContent = 화면문구.오른쪽제목강조;
    document.getElementById("commentText").textContent = 직원정보.코멘트;

    const keywordTags = document.getElementById("keywordTags");
    직원정보.키워드.forEach((키워드) => {
      const span = document.createElement("span");
      span.className = "keyword-tag";
      span.textContent = 키워드;
      keywordTags.appendChild(span);
    });

    const floatingCharacters = document.getElementById("floatingCharacters");

    캐릭터목록.forEach((이미지경로, index) => {
      const wrapper = document.createElement("div");
      wrapper.className = `floating-char c${index + 1}`;

      const img = document.createElement("img");
      img.src = 이미지경로;
      img.alt = "";
      img.onerror = function () {
        this.style.display = "none";
      };

      wrapper.appendChild(img);
      floatingCharacters.appendChild(wrapper);
    });
  </script>
</body>
</html>
