<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>직원 소개</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #efefef;
      color: #111;
    }

    body {
      min-height: 100vh;
    }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background: #efefef;
    }

    /* 큰 배경 캐릭터 */
    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("char2.png");
      background-repeat: no-repeat;
      background-size: 980px auto;
      background-position: center 43%;
      opacity: 0.12;
      filter: blur(1px) grayscale(25%);
      pointer-events: none;
      z-index: 0;
    }

    /* 부드러운 밝은 오버레이 */
    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.25), transparent 32%),
        linear-gradient(to bottom, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      max-width: 1120px;
      margin: 0 auto;
      padding: 34px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-wrap {
      position: relative;
      width: 100%;
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      gap: 20px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 30px;
      padding: 22px;
      box-shadow: 0 18px 50px rgba(0, 31, 255, 0.06);
      backdrop-filter: blur(14px);
    }

    /* 왼쪽 카드 */
    .profile-card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 22px;
      color: #f8fbff;
      background: linear-gradient(
        135deg,
        #001fff 0%,
        rgba(0, 70, 255, 0.95) 40%,
        rgba(0, 150, 255, 0.88) 72%,
        rgba(0, 255, 242, 0.78) 100%
      );
      border: 1px solid rgba(255,255,255,0.24);
      box-shadow:
        0 16px 40px rgba(0, 31, 255, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.14);
    }

    .profile-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 18%, rgba(255,255,255,0.24), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(255,255,255,0.12), transparent 18%),
        linear-gradient(125deg, rgba(255,255,255,0.10), transparent 42%);
      pointer-events: none;
    }

    .badge {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.12);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00fff2;
    }

    .photo-box {
      position: relative;
      z-index: 1;
      margin-top: 16px;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.10);
    }

    .photo-box img {
      display: block;
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .info-list {
      position: relative;
      z-index: 1;
      margin-top: 16px;
      display: grid;
      gap: 8px;
    }

    .info-item {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.11);
    }

    .info-label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      color: rgba(236, 244, 255, 0.78);
    }

    .info-value {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      line-height: 1.45;
      word-break: break-word;
    }

    /* 오른쪽 카드 */
    .content-card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(0, 31, 255, 0.08);
      background: rgba(255,255,255,0.88);
      padding: 24px;
      min-height: 540px;
    }

    .section-label {
      position: relative;
      z-index: 4;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: rgba(0,0,0,0.45);
    }

    h1 {
      position: relative;
      z-index: 4;
      margin: 10px 0 14px;
      font-size: 31px;
      line-height: 1.15;
      color: #001fff;
    }

    .gradient-text {
      color: #001fff;
    }

    .comment-section {
      position: relative;
      z-index: 4;
      margin-top: 14px;
      padding-top: 6px;
    }

    .comment-content {
      font-size: 15px;
      line-height: 1.82;
      color: rgba(20, 24, 35, 0.82);
      white-space: pre-line;
      word-break: keep-all;
    }

    .keyword-box {
      position: relative;
      z-index: 4;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(0,31,255,0.08);
    }

    .keyword-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }

    .keyword-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .keyword-tag {
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(0, 31, 255, 0.06);
      border: 1px solid rgba(0, 31, 255, 0.10);
      color: #001fff;
      font-size: 13px;
      font-weight: 600;
    }

    /* 캐릭터 영역 */
    .floating-characters {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .floating-char {
      position: absolute;
      width: 48px;
      height: 48px;
      pointer-events: auto;
    }

    .floating-char img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: transform 0.25s ease;
      animation: bob 3.8s ease-in-out infinite;
      user-select: none;
      -webkit-user-drag: none;
    }

    .floating-char:hover img {
      transform: scale(1.32);
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* 캐릭터 위치: 서로 떨어지게 */
    .c1 { top: 24px; left: 18px; animation: move1 16s ease-in-out infinite alternate; }
    .c2 { top: 44px; left: 255px; animation: move2 18s ease-in-out infinite alternate; }
    .c3 { top: 22px; right: 70px; animation: move3 17s ease-in-out infinite alternate; }
    .c4 { top: 210px; right: 22px; animation: move4 19s ease-in-out infinite alternate; }
    .c5 { top: 345px; left: 36px; animation: move5 18s ease-in-out infinite alternate; }
    .c6 { top: 372px; right: 225px; animation: move6 20s ease-in-out infinite alternate; }

    @keyframes move1 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(84px, 26px); }
    }

    @keyframes move2 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(74px, 36px); }
    }

    @keyframes move3 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-82px, 34px); }
    }

    @keyframes move4 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-70px, 24px); }
    }

    @keyframes move5 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(88px, -28px); }
    }

    @keyframes move6 {
      0% { transform: translate(0, 0) rotate(-90deg); }
      100% { transform: translate(-76px, -34px) rotate(-90deg); }
    }

    .c6 img {
      transform: rotate(-90deg);
    }

    @media (max-width: 1000px) {
      .card-wrap {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .container {
        padding: 18px 14px;
      }

      .card-wrap {
        padding: 16px;
        gap: 14px;
      }

      .profile-card,
      .content-card {
        padding: 18px;
      }

      h1 {
        font-size: 26px;
      }

      .photo-box img {
        height: 200px;
      }

      .floating-char {
        width: 40px;
        height: 40px;
      }

      .page::before {
        background-size: 760px auto;
        background-position: center 34%;
      }
    }
  </style>
</head>
<body>
  <script>
    const 직원정보 = {
      이름: "김연주",
      이메일: "yeonju.kim@soslab.co",
      전화번호: "010-4224-1119",
      팀: "Validation개발팀",
      직책: "프로덕트 담당",
      근무지역: "판교",
      사진: "bono.png",
      코멘트: `안녕하세요.

저는 김연주입니다.
현재 Validation개발팀에서 업무를 담당하고 있습니다.

협업할 때는 정확하고 보기 쉽게 정리하는 것을 중요하게 생각합니다.
새로운 아이디어를 함께 이야기하고, 필요한 내용을 빠르게 공유하는 것을 좋아합니다.

앞으로도 즐겁게 소통하면서 좋은 결과를 만들어가고 싶습니다.
잘 부탁드립니다 :)`,
      키워드: ["다이어트", "홍길동", "해달"]
    };

    const 화면문구 = {
      상단라벨: "프로필",
      오른쪽제목앞: "소개와",
      오른쪽제목강조: "코멘트"
    };

    const 캐릭터목록 = [
      "char1.png",
      "char2.png",
      "char3.png",
      "char4.png",
      "char5.png",
      "char6.png"
    ];
  </script>

  <div class="page">
    <main class="container">
      <section class="card-wrap">
        <!-- 왼쪽 -->
        <div class="profile-card">
          <div class="badge">
            <span class="badge-dot"></span>
            <span id="topLabel"></span>
          </div>

          <div class="photo-box">
            <img id="profileImage" alt="프로필 사진" />
          </div>

          <div class="info-list">
            <div class="info-item">
              <span class="info-label">이름</span>
              <span class="info-value" id="name"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Email</span>
              <span class="info-value" id="email"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Phone Number</span>
              <span class="info-value" id="phone"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Team</span>
              <span class="info-value" id="team"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Position</span>
              <span class="info-value" id="position"></span>
            </div>
            <div class="info-item">
              <span class="info-label">근무지역</span>
              <span class="info-value" id="location"></span>
            </div>
          </div>
        </div>

        <!-- 오른쪽 -->
        <div class="content-card">
          <div class="section-label">COMMENTS</div>

          <h1>
            <span id="titleFront"></span>
            <span class="gradient-text" id="titleAccent"></span>
          </h1>

          <!-- 움직이는 캐릭터 -->
          <div class="floating-characters" id="floatingCharacters"></div>

          <div class="comment-section">
            <div class="comment-content" id="commentText"></div>
          </div>

          <div class="keyword-box">
            <p class="keyword-title">키워드</p>
            <div class="keyword-tags" id="keywordTags"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    document.getElementById("topLabel").textContent = 화면문구.상단라벨;
    document.getElementById("profileImage").src = 직원정보.사진;
    document.getElementById("name").textContent = 직원정보.이름;
    document.getElementById("email").textContent = 직원정보.이메일;
    document.getElementById("phone").textContent = 직원정보.전화번호;
    document.getElementById("team").textContent = 직원정보.팀;
    document.getElementById("position").textContent = 직원정보.직책;
    document.getElementById("location").textContent = 직원정보.근무지역;
    document.getElementById("titleFront").textContent = 화면문구.오른쪽제목앞;
    document.getElementById("titleAccent").textContent = 화면문구.오른쪽제목강조;
    document.getElementById("commentText").textContent = 직원정보.코멘트;

    const keywordTags = document.getElementById("keywordTags");
    직원정보.키워드.forEach((키워드) => {
      const span = document.createElement("span");
      span.className = "keyword-tag";
      span.textContent = 키워드;
      keywordTags.appendChild(span);
    });

    const floatingCharacters = document.getElementById("floatingCharacters");

    캐릭터목록.forEach((이미지경로, index) => {
      const wrapper = document.createElement("div");
      wrapper.className = `floating-char c${index + 1}`;

      const img = document.createElement("img");
      img.src = 이미지경로;
      img.alt = "";
      img.onerror = function () {
        this.style.display = "none";
      };

      wrapper.appendChild(img);
      floatingCharacters.appendChild(wrapper);
    });
  </script>
</body>
</html>
